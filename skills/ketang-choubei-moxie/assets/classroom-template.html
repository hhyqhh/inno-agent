<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>课堂抽背与默写</title>
  <style>
    :root{--ink:#14213d;--muted:#65728a;--paper:#fffdf8;--accent:#d3543c;--accent2:#1f6f78;--line:#e7dfd3;--good:#237a57;--warn:#a86518;--bad:#a33a3a}
    *{box-sizing:border-box}body{margin:0;background:#f2eee7;color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",sans-serif}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}.top{display:flex;justify-content:space-between;gap:20px;align-items:center;padding:22px 4vw;background:var(--paper);border-bottom:1px solid var(--line)}h1{font-size:clamp(22px,3vw,38px);margin:0}.subtitle{color:var(--muted);margin-top:5px}.toolbar,.actions,.marks{display:flex;gap:10px;flex-wrap:wrap}button,select,input{font:inherit}button{border:0;border-radius:12px;padding:11px 16px;cursor:pointer;background:#e8e4dc;color:var(--ink);font-weight:650}button:hover{filter:brightness(.96)}button.primary{background:var(--accent);color:white}button.secondary{background:var(--accent2);color:white}button:disabled{opacity:.45;cursor:not-allowed}.main{display:grid;grid-template-columns:minmax(230px,29vw) 1fr;gap:22px;padding:24px 4vw}.side,.card{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 35px #463b2c12}.side{padding:20px}.person{text-align:center;padding:28px 10px;border-radius:18px;background:#f6eee5}.person .label,.meta{color:var(--muted);font-size:14px}.person .name{font-size:clamp(30px,5vw,58px);font-weight:800;margin-top:8px}.stats{margin:20px 0;display:grid;gap:8px}.roster{max-height:30vh;overflow:auto;border-top:1px solid var(--line);padding-top:12px}.student{display:flex;justify-content:space-between;gap:8px;padding:7px 4px}.student.used{color:var(--muted)}.student.excluded{text-decoration:line-through;opacity:.55}.student button{padding:3px 9px;font-size:12px}.card{padding:clamp(24px,4vw,60px);display:flex;flex-direction:column;justify-content:center;min-height:58vh}.question-head{display:flex;justify-content:space-between;gap:18px;align-items:center}.badge{background:#e3f0ef;color:var(--accent2);padding:6px 11px;border-radius:999px;font-weight:700}.timer{font-size:clamp(24px,4vw,45px);font-weight:850;color:var(--accent)}.prompt{font-family:"Songti SC","STSong",serif;font-size:clamp(28px,4.5vw,60px);line-height:1.65;white-space:pre-wrap;margin:38px 0}.hint,.answer{padding:18px 20px;border-radius:14px;white-space:pre-wrap;line-height:1.7}.hint{background:#fff2d9;color:#72521b}.answer{background:#e8f3ec;color:#174f39;margin-top:12px;font-size:clamp(18px,2.2vw,28px)}.hidden{display:none}.footer{padding:18px 4vw 28px;display:flex;justify-content:space-between;gap:18px;align-items:center}.marks button[data-mark="掌握"]{color:var(--good)}.marks button[data-mark="需复习"]{color:var(--warn)}.marks button[data-mark="缺席"]{color:var(--bad)}.empty{color:var(--muted)}
    @media(max-width:820px){.main{grid-template-columns:1fr}.side{order:2}.card{min-height:48vh}.toolbar{justify-content:flex-end}.top{align-items:flex-start}.footer{align-items:flex-start;flex-direction:column}}
    .print-sheet{display:none}.print-item{page-break-inside:avoid;margin:0 0 28px}.print-item h2{font-size:19px;margin:0 0 8px}.print-item .print-prompt{font-size:22px;line-height:1.6;white-space:pre-wrap}.print-item .print-answer{display:none;color:#174f39;margin-top:10px;white-space:pre-wrap}
    @media print{body{background:white}.app{display:none!important}.print-sheet{display:block;padding:10mm}.print-sheet>h1{font-size:28px;margin-bottom:5px}.print-sheet>.subtitle{margin-bottom:28px}.print-answer .print-item .print-answer{display:block}body:not(.print-answer) .print-item{min-height:120px}}
  </style>
</head>
<body>
<div class="app">
  <header class="top"><div><h1 id="title"></h1><div class="subtitle" id="subtitle"></div></div><div class="toolbar"><button id="fullscreen">全屏</button><button id="printQuestions">打印题目卷</button><button id="printAnswers">打印答案卷</button></div></header>
  <main class="main">
    <aside class="side">
      <div class="person"><div class="label">本次抽取</div><div class="name" id="studentName">尚未抽取</div></div>
      <div class="stats"><div>学生：<b id="studentStats"></b></div><div>题目：<b id="questionStats"></b></div><label>随机方式：<select id="drawMode"><option value="no-repeat">一轮不重复</option><option value="random">纯随机</option></select></label></div>
      <div class="roster" id="roster"></div>
    </aside>
    <section class="card">
      <div class="question-head"><div><span class="badge" id="type">等待抽题</span><span class="meta" id="source"></span></div><div class="timer" id="timer">--</div></div>
      <div class="prompt empty" id="prompt">点击“同时抽取”开始课堂活动</div>
      <div class="hint hidden" id="hint"></div><div class="answer hidden" id="answer"></div>
      <div class="actions"><button id="showHint">显示提示</button><button id="showAnswer">显示答案</button><button id="startTimer">开始倒计时</button></div>
    </section>
  </main>
  <footer class="footer"><div class="actions"><button id="drawStudent">只抽学生</button><button id="drawQuestion">只抽题目</button><button class="primary" id="drawBoth">同时抽取</button><button id="resetRound">重置本轮</button></div><div class="marks"><button data-mark="掌握">✓ 掌握</button><button data-mark="需复习">↻ 需复习</button><button data-mark="缺席">○ 缺席</button></div></footer>
</div>
<section class="print-sheet" id="printSheet"><h1></h1><div class="subtitle"></div><div id="printItems"></div></section>
<script id="classroom-data" type="application/json">__CLASSROOM_DATA__</script>
<script>
const data=JSON.parse(document.getElementById('classroom-data').textContent);const $=id=>document.getElementById(id);const key='ketang-choubei-moxie:'+data.title;let saved={};try{saved=JSON.parse(localStorage.getItem(key)||'{}')}catch{}let state={usedStudents:saved.usedStudents||[],usedQuestions:saved.usedQuestions||[],excluded:saved.excluded||[],records:saved.records||[],student:saved.student||'',questionId:saved.questionId||'',mode:saved.mode||data.settings.drawMode};let timerHandle=null;
function persist(){localStorage.setItem(key,JSON.stringify(state))}function choose(items){return items[Math.floor(Math.random()*items.length)]}function currentQ(){return data.questions.find(q=>q.id===state.questionId)}
function pool(items,used,id){if(state.mode==='random')return items;const left=items.filter(x=>!used.includes(id(x)));return left.length?left:items}
function drawStudent(){const active=data.students.filter(x=>!state.excluded.includes(x));if(!active.length){state.student='';render();return}const candidates=pool(active,state.usedStudents,x=>x);if(state.mode==='no-repeat'&&candidates.length===active.length&&active.every(x=>state.usedStudents.includes(x)))state.usedStudents=[];state.student=choose(candidates);if(!state.usedStudents.includes(state.student))state.usedStudents.push(state.student);persist();render()}
function drawQuestion(){let candidates=pool(data.questions,state.usedQuestions,x=>x.id);if(state.mode==='no-repeat'&&candidates.length===data.questions.length&&data.questions.every(x=>state.usedQuestions.includes(x.id)))state.usedQuestions=[];const q=choose(candidates);state.questionId=q.id;if(!state.usedQuestions.includes(q.id))state.usedQuestions.push(q.id);persist();render();hideDetails();resetTimer()}
function render(){document.title=data.title;$('title').textContent=data.title;$('subtitle').textContent=data.subtitle;$('studentName').textContent=state.student||'尚未抽取';$('drawMode').value=state.mode;const active=data.students.filter(x=>!state.excluded.includes(x));$('studentStats').textContent=data.students.length?`${state.usedStudents.filter(x=>active.includes(x)).length}/${active.length} 已抽`:'未提供名单';$('questionStats').textContent=`${state.usedQuestions.length}/${data.questions.length} 已抽`;$('drawStudent').disabled=!data.students.length;$('roster').innerHTML=data.students.length?data.students.map(name=>`<div class="student ${state.usedStudents.includes(name)?'used':''} ${state.excluded.includes(name)?'excluded':''}"><span>${escapeHtml(name)}</span><button data-name="${escapeHtml(name)}">${state.excluded.includes(name)?'恢复':'暂不参与'}</button></div>`).join(''):'<div class="empty">未提供学生名单，可单独抽题。</div>';const q=currentQ();if(q){$('type').textContent=q.type;$('source').textContent=q.source?' · '+q.source:'';$('prompt').textContent=q.prompt;$('prompt').classList.remove('empty');$('hint').textContent=q.hint||(q.keywords.length?'关键词：'+q.keywords.join('、'):'无提示');$('answer').textContent=q.answer}else{$('type').textContent='等待抽题';$('source').textContent='';$('prompt').textContent='点击“同时抽取”开始课堂活动';$('prompt').classList.add('empty')}}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function hideDetails(){$('hint').classList.add('hidden');$('answer').classList.add('hidden');$('showHint').textContent='显示提示';$('showAnswer').textContent='显示答案'}
function resetTimer(){clearInterval(timerHandle);$('timer').textContent='--'}function startTimer(){resetTimer();let left=data.settings.timerSeconds;if(!left){$('timer').textContent='∞';return}$('timer').textContent=left;timerHandle=setInterval(()=>{left--;$('timer').textContent=left;if(left<=0){clearInterval(timerHandle);$('timer').textContent='时间到'}},1000)}
$('printSheet').querySelector('h1').textContent=data.title;$('printSheet').querySelector('.subtitle').textContent=data.subtitle;$('printItems').innerHTML=data.questions.map((q,i)=>`<article class="print-item"><h2>${i+1}. ${escapeHtml(q.type)}${q.source?' · '+escapeHtml(q.source):''}</h2><div class="print-prompt">${escapeHtml(q.prompt)}</div><div class="print-answer"><b>参考答案：</b>${escapeHtml(q.answer)}</div></article>`).join('');$('drawStudent').onclick=drawStudent;$('drawQuestion').onclick=drawQuestion;$('drawBoth').onclick=()=>{drawStudent();drawQuestion()};$('showHint').onclick=()=>{const h=$('hint');h.classList.toggle('hidden');$('showHint').textContent=h.classList.contains('hidden')?'显示提示':'隐藏提示'};$('showAnswer').onclick=()=>{const a=$('answer');a.classList.toggle('hidden');$('showAnswer').textContent=a.classList.contains('hidden')?'显示答案':'隐藏答案'};$('startTimer').onclick=startTimer;$('drawMode').onchange=e=>{state.mode=e.target.value;persist();render()};$('roster').onclick=e=>{const name=e.target.dataset.name;if(!name)return;state.excluded=state.excluded.includes(name)?state.excluded.filter(x=>x!==name):[...state.excluded,name];persist();render()};$('resetRound').onclick=()=>{if(confirm('确定清空本轮抽取记录吗？')){state.usedStudents=[];state.usedQuestions=[];state.records=[];state.student='';state.questionId='';persist();hideDetails();resetTimer();render()}};document.querySelectorAll('[data-mark]').forEach(b=>b.onclick=()=>{if(!state.student&&!state.questionId)return;state.records.push({time:new Date().toISOString(),student:state.student,questionId:state.questionId,mark:b.dataset.mark});persist();b.textContent='已记录：'+b.dataset.mark;setTimeout(()=>b.textContent=({'掌握':'✓ 掌握','需复习':'↻ 需复习','缺席':'○ 缺席'})[b.dataset.mark],900)});$('fullscreen').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();$('printQuestions').onclick=()=>{document.body.classList.remove('print-answer');print()};$('printAnswers').onclick=()=>{document.body.classList.add('print-answer');print();setTimeout(()=>document.body.classList.remove('print-answer'),300)};render();
</script>
</body>
</html>
